# =============================================================================
# metrics.yaml — Metric definitions for the zabbig monitoring client
#
# -----------------------------------------------------------------------------
# TOP-LEVEL STRUCTURE
# -----------------------------------------------------------------------------
#
#   version            integer   Schema version. Must be 1.
#
#   defaults           map       Global defaults applied to every metric entry
#                                unless overridden at a lower level.
#
#   collector_defaults map       Per-collector overrides of the global defaults.
#                                Keys are collector names (cpu, memory, disk,
#                                service). Values support the same fields as
#                                defaults.
#
#   metrics            list      Ordered list of individual metric definitions.
#                                Each entry is one data point sent to Zabbix.
#
# -----------------------------------------------------------------------------
# DEFAULTS / COLLECTOR_DEFAULTS FIELDS
# -----------------------------------------------------------------------------
# These fields can appear under both `defaults` and `collector_defaults.<name>`.
# A more specific scope always wins:
#   metric field  >  collector_defaults  >  defaults
#
#   enabled          bool      true | false
#                              Whether to run and send this metric.
#                              Default: true
#
#   delivery         string    batch | immediate
#                              batch     — collected within the batch window,
#                                          then sent together in one request.
#                              immediate — sent as soon as the value is ready,
#                                          before the batch window closes.
#                                          Use for time-sensitive checks (e.g.
#                                          service state).
#                              Default: batch
#
#   timeout_seconds  float     > 0
#                              How long to wait for the collector to return a
#                              value before it is considered timed out. The
#                              error_policy then applies.
#                              Default: 10
#
#   error_policy     string    skip | fallback | mark_failed
#                              skip        — Silently discard the metric for
#                                            this run. Nothing is sent to
#                                            Zabbix. The run summary counts it
#                                            as "skipped".
#                              fallback    — Send fallback_value to Zabbix
#                                            instead of the real value. Useful
#                                            when a missing feature (e.g. no
#                                            swap) should report a known-good
#                                            sentinel (e.g. "0").
#                                            Requires fallback_value to be set
#                                            on the metric entry.
#                              mark_failed — Log an error and count the metric
#                                            as failed in the run summary. Does
#                                            not send anything to Zabbix.
#                              Default: skip
#
# -----------------------------------------------------------------------------
# METRIC ENTRY FIELDS
# -----------------------------------------------------------------------------
# Each entry under `metrics` supports the fields above (enabled, delivery,
# timeout_seconds, error_policy) plus the following:
#
#   id               string    REQUIRED. Unique identifier for this metric
#                              within this file. Used in logs and state files.
#                              Example: cpu_util
#
#   collector        string    REQUIRED. Which built-in collector to use.
#                              Valid values: cpu | memory | disk | service
#
#   key              string    REQUIRED. Zabbix item key. Must exactly match a
#                              Zabbix Trapper item configured on the target host.
#                              Example: host.cpu.util
#
#   value_type       string    float | int | string
#                              Informational hint only. Does not affect the wire
#                              format — all values are sent as strings.
#
#   unit             string    Informational unit label (e.g. "%", "B", "s").
#                              Not sent to Zabbix; used in logs only.
#
#   fallback_value   string    REQUIRED when error_policy is "fallback".
#                              The value sent to Zabbix when the collector
#                              fails or times out. Must be a string (quote
#                              numeric values). Example: "0"
#
#   params           map       REQUIRED. Collector-specific parameters.
#                              See per-collector sections below.
#
#   params.proc_root string    UNIVERSAL OVERRIDE for proc-based collectors
#                              (cpu, memory, service/process).
#                              Overrides runtime.proc_root from client.yaml
#                              for this specific metric only.
#                              Default: value of runtime.proc_root (which
#                              itself defaults to "/proc").
#                              Example: proc_root: "/host/proc"
#
# -----------------------------------------------------------------------------
# DEFAULTS — max_response_bytes
# -----------------------------------------------------------------------------
#   max_response_bytes integer  Maximum bytes read from an HTTP response body
#                              before the stream is closed. Applies only to
#                              probe collector in http_body mode.
#                              Override per-metric under params.
#                              Default: 65536 (64 KiB)
#
# -----------------------------------------------------------------------------
# PARAMS — probe collector
# -----------------------------------------------------------------------------
# Active connectivity checks against TCP ports and HTTP(S) endpoints.
# The probe always completes and returns a value — connection failures map
# to `on_failure` / `default_value` rather than raising an error.
#
#   mode   string   REQUIRED
#          tcp         — TCP socket connection check.
#                        Returns `on_success` when port is reachable,
#                        `on_failure` when not (refused or timeout).
#          http_status — HTTP request. Evaluates the numeric status code
#                        (as a string) through `conditions`. Without
#                        `conditions`, returns the raw status code integer.
#          http_body   — HTTP request. Evaluates response body lines through
#                        the same conditions engine as the log collector.
#                        Pre-filter with `match` before condition evaluation.
#
# --- tcp mode params ---
#   host            string   REQUIRED. Hostname or IP address to connect to.
#   port            integer  REQUIRED. TCP port number.
#   on_success      any      Value when port is reachable.  Default: 1
#   on_failure      any      Value when port is refused or times out. Default: 0
#
# --- http mode params (http_status and http_body) ---
#   url             string   REQUIRED. Full URL including scheme
#                            (http:// or https://).
#   method          string   HTTP method. Default: GET
#   headers         map      Optional request headers. Each key/value pair
#                            is sent as an HTTP header.
#                            Example:
#                              headers:
#                                Authorization: "Bearer token123"
#                                Accept: "application/json"
#   default_value   any      Value sent when the connection fails or no
#                            condition matches. Default: 0
#
# --- http_status mode params ---
#   conditions      list     Ordered condition list. The status code is
#                            evaluated as a string (e.g. "200", "503").
#                            Uses the same condition engine as the log
#                            collector (when: / extract: / catch-all).
#                            Without conditions, the raw integer status
#                            code is returned.
#
# --- http_body mode params ---
#   match           string   Optional Python regex. Only lines containing
#                            a match are forwarded to condition evaluation.
#                            If provided and no line matches, default_value
#                            is returned. Omit to pass all lines.
#   result          string   How to reduce multiple per-line values:
#                            last (default) | first | max | min
#   conditions      list     Same engine and syntax as log collector.
#                            Evaluated per-line against body lines that
#                            pass `match`. Without conditions, returns 1
#                            when any matching line exists.
#   max_response_bytes integer
#                            Cap on bytes read from the response body.
#                            Default: defaults.max_response_bytes (65536)
#
# --- sub-keys (all modes) ---
#   response_time_ms bool    false (default). When true, also sends a Zabbix
#                            item to <key>.response_time_ms with the TCP or
#                            HTTP round-trip time in milliseconds.
#                            Reports 0 on probe failure.
#
#   ssl_check        bool    false (default). http modes only. When true,
#                            also sends a Zabbix item to <key>.ssl_check:
#                              1  =  certificate valid and trusted
#                              0  =  certificate invalid (expired, wrong host)
#                              2  =  unknown (handshake failed / unreachable)
#                            Checked via a separate TLS handshake using the
#                            system default trust store. The main HTTP request
#                            always uses verify=False so the probe completes
#                            regardless of certificate state.
#
#   NOTE: Sub-key items (<key>.response_time_ms, <key>.ssl_check) must be
#   configured as separate Trapper items in Zabbix with matching keys.
#
# -----------------------------------------------------------------------------
# PARAMS — cpu collector
# -----------------------------------------------------------------------------
#   mode   string   REQUIRED
#          percent   — Total CPU utilisation 0-100. Calculated from two
#                      /proc/stat reads 200 ms apart (requires Linux).
#          load1     — 1-minute load average from /proc/loadavg.
#          load5     — 5-minute load average from /proc/loadavg.
#          load15    — 15-minute load average from /proc/loadavg.
#          uptime    — System uptime in seconds from /proc/uptime.
#
#   proc_root  string  Optional. Overrides runtime.proc_root for this metric.
#                      Default: runtime.proc_root (which defaults to "/proc").
#
# -----------------------------------------------------------------------------
# PARAMS — memory collector
# -----------------------------------------------------------------------------
#   mode   string   REQUIRED
#          used_percent       — RAM in use as a percentage.
#                               Calculated as (MemTotal - MemAvailable) /
#                               MemTotal * 100. Source: /proc/meminfo.
#          available_bytes    — MemAvailable field from /proc/meminfo (bytes).
#                               Represents memory available for new allocations
#                               without swapping.
#          swap_used_percent  — Swap in use as a percentage.
#                               Returns 0.0 when no swap is configured.
#                               Source: SwapTotal / SwapFree in /proc/meminfo.
#
#   proc_root  string  Optional. Overrides runtime.proc_root for this metric.
#                      Default: runtime.proc_root (which defaults to "/proc").
#
# -----------------------------------------------------------------------------
# PARAMS — disk collector
# -----------------------------------------------------------------------------
#   mount  string   REQUIRED. Absolute path to the mount point to inspect.
#                   Example: "/"  "/data"  "/var"
#
#   mode   string   REQUIRED
#          used_percent        — Percentage of filesystem blocks in use.
#                                Uses os.statvfs(); works on Linux and macOS.
#          used_bytes          — Bytes currently used (total - available to non-root).
#                                Uses os.statvfs(); works on Linux and macOS.
#          free_bytes          — Bytes available to non-root users (f_bavail).
#                                Uses os.statvfs(); works on Linux and macOS.
#          inodes_used_percent — Inode slots in use as a percentage of the total.
#                                Returns 0.0 on filesystems with dynamic inode
#                                allocation (e.g. btrfs) where f_files == 0.
#                                Uses os.statvfs(); works on Linux and macOS.
#          inodes_used         — Number of inode slots currently in use.
#                                Uses os.statvfs(); works on Linux and macOS.
#          inodes_free         — Number of free inode slots (f_ffree).
#                                Uses os.statvfs(); works on Linux and macOS.
#          inodes_total        — Total inode slots on the filesystem (f_files).
#                                Uses os.statvfs(); works on Linux and macOS.
#
# -----------------------------------------------------------------------------
# PARAMS — service collector
# -----------------------------------------------------------------------------
#   check_mode      string   REQUIRED
#                   systemd  — Runs `systemctl is-active --quiet <service_name>`.
#                              Returns 1 if exit code 0, 0 otherwise.
#                              Requires systemd and a Linux host.
#                   process  — Scans {proc_root}/*/cmdline for a matching process.
#                              Returns 1 if at least one process matches,
#                              0 otherwise. Requires Linux /proc filesystem.
#
#   service_name    string   REQUIRED when check_mode is "systemd".
#                            The systemd unit name (without .service suffix).
#                            Example: sshd  nginx  postgresql
#
#   process_pattern string   REQUIRED when check_mode is "process".
#                            Python regex matched against each process's full
#                            cmdline string. Case-sensitive.
#                            Example: "cron"  matches crond, cron, anacron, etc.
#                            Example: "nginx: master"  for strict nginx check.
#
#   proc_root       string   Optional. Applies only to check_mode: process.
#                            Overrides runtime.proc_root for this metric.
#                            Default: runtime.proc_root (which defaults to "/proc").
#
# -----------------------------------------------------------------------------
# PARAMS — network collector
# -----------------------------------------------------------------------------
# Reads from {proc_root}/net/dev and {proc_root}/net/sockstat (Linux only).
# macOS and other systems without a proc filesystem will fail; error_policy
# applies (default: skip).
#
#   interface  string   REQUIRED for all traffic/error/counter modes.
#                       The NIC name as shown in /proc/net/dev.
#                       Example: eth0  ens3  enp1s0
#                       Use "total" to aggregate all non-loopback interfaces.
#                       NOT required for socket modes (tcp_inuse, tcp_timewait,
#                       tcp_orphans, udp_inuse).
#
#   mode       string   REQUIRED
#
#              Rate modes — read /proc/net/dev twice with a 1 s sleep:
#                rx_bytes_per_sec  — Inbound throughput in bytes/second.
#                tx_bytes_per_sec  — Outbound throughput in bytes/second.
#                Set timeout_seconds >= 3 for rate modes.
#
#              Cumulative counter modes — single /proc/net/dev read:
#                rx_bytes          — Total bytes received since boot.
#                tx_bytes          — Total bytes transmitted since boot.
#                rx_packets        — Total packets received since boot.
#                tx_packets        — Total packets transmitted since boot.
#                rx_errors         — Total receive errors since boot.
#                tx_errors         — Total transmit errors since boot.
#                rx_dropped        — Total receive drops since boot.
#                tx_dropped        — Total transmit drops since boot.
#
#              Socket counters — from /proc/net/sockstat, no interface param:
#                tcp_inuse         — Currently open TCP sockets.
#                tcp_timewait      — Sockets in TIME_WAIT state.
#                tcp_orphans       — Orphaned TCP sockets (no fd attached).
#                udp_inuse         — Currently open UDP sockets.
#
#   proc_root  string  Optional. Overrides runtime.proc_root for this metric.
#                      Default: runtime.proc_root (which defaults to "/proc").
#
# -----------------------------------------------------------------------------
# PARAMS — log collector
# -----------------------------------------------------------------------------
# Monitors application log files for specific messages.
# Memory-efficient: files are read line-by-line after seeking to the stored
# offset — the full file is NEVER loaded into memory.
#
#   path          string   REQUIRED
#                          Path to the log file. The basename (filename part)
#                          may be a Python regex; the directory is always
#                          treated as a literal path. The most recently
#                          modified matching file is used.
#                          Examples:
#                            path: /var/log/myapp/app.log
#                            path: /var/log/myapp/app-\d{8}\.log
#
#   match         string   REQUIRED
#                          Python regex applied to every line. Only matching
#                          lines are forwarded to condition evaluation or
#                          counted. Use anchors (^) or keywords to narrow
#                          the set as tightly as possible.
#
#   mode          string   condition | count    (default: condition)
#
#                          condition — Incremental scan from the last stored
#                            byte offset to EOF. Evaluates `conditions` on
#                            each matching line and returns one value per run.
#                            The byte offset and inode are persisted between
#                            runs (see `state_dir`). Rotation detection:
#                            a new inode or a smaller file size resets the
#                            offset to 0.
#
#                          count — Full-file scan (byte 0 → EOF) every run.
#                            Counts all lines matching `match` and returns a
#                            cumulative integer. The value grows monotonically
#                            as the file grows; use a Zabbix "Delta per second"
#                            preprocessing step for rate-of-change graphs.
#                            No state file is written in this mode.
#                            NOTE: cost scales with file size, not new content.
#                            Avoid on files > ~100 MB with short intervals.
#
#   encoding      string   File character encoding.  Default: utf-8
#
#   result        string   (mode=condition only)
#                          How to collapse values from multiple matching lines
#                          found in one scan window into a single Zabbix value:
#                            last  — value from the LAST  matching line (default)
#                            first — value from the FIRST matching line
#                            max   — numerically highest value across all matches
#                            min   — numerically lowest  value across all matches
#                          Non-numeric values are ignored for max/min; last is
#                          used as fallback when no numeric values exist.
#
#   default_value any      (mode=condition only)
#                          Value sent to Zabbix when no line matched `match`
#                          in this scan window. Keeps the item from going stale.
#                          Default: 0
#
#   conditions    list     (mode=condition only)
#                          Ordered list of sub-conditions evaluated against
#                          each line that already passed `match`. The FIRST
#                          matching entry wins.
#
#                          Each entry supports one of three forms:
#
#                          Form 1 — regex match:
#                            when:  <Python regex>
#                            value: <literal value to return>
#
#                          Form 2 — numeric extract + comparison:
#                            extract:   <Python regex with ONE capture group>
#                            compare:   gt | lt | gte | lte | eq
#                            threshold: <number>
#                            value:     <literal value>  OR  "$1"
#                          `extract` runs re.search on the line. The text
#                          inside the capture group () is cast to float and
#                          compared against `threshold`. Use value: "$1" to
#                          return the captured number itself as the metric
#                          value instead of a fixed constant.
#
#                          Form 3 — catch-all (place last):
#                            value: <literal value>
#                          No `when` or `extract` — matches any line that
#                          passed `match` but no earlier condition.
#
#                          NOTE: `when` and `extract` are mutually exclusive.
#
#   state_dir     string   Directory where offset state files are written.
#                          One file per metric: state/log_<metric_id>.json
#                          Default: value of `state.directory` from client.yaml
#                          (which itself defaults to "state" relative to the
#                          working directory). Can be overridden per-metric in
#                          params if needed.
#
# =============================================================================

version: 1

# ---------------------------------------------------------------------------
# Global defaults — applied to every metric unless overridden at a lower level
# ---------------------------------------------------------------------------
defaults:
  enabled: true
  delivery: batch
  timeout_seconds: 10
  error_policy: skip
  max_response_bytes: 65536     # max HTTP body bytes for probe http_body mode

# ---------------------------------------------------------------------------
# Collector-level defaults — override global defaults for a specific collector
# ---------------------------------------------------------------------------
collector_defaults:
  cpu:
    timeout_seconds: 5
    delivery: batch
  memory:
    timeout_seconds: 5
    delivery: batch
  disk:
    timeout_seconds: 10
    delivery: batch
  service:
    timeout_seconds: 8
    delivery: immediate     # service state changes are sent immediately
  network:
    timeout_seconds: 10
    delivery: batch
  log:
    timeout_seconds: 60
    delivery: batch
  probe:
    timeout_seconds: 10
    delivery: immediate     # probes are time-sensitive; send as soon as collected

# ---------------------------------------------------------------------------
# Metrics
# ---------------------------------------------------------------------------
metrics:

  # ---- CPU ---------------------------------------------------------------

  - id: cpu_util
    enabled: true
    collector: cpu
    key: host.cpu.util
    value_type: float
    unit: "%"
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      mode: percent

  - id: load_avg_1
    enabled: true
    collector: cpu
    key: host.cpu.load1
    value_type: float
    unit: ""
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      mode: load1

  - id: load_avg_5
    enabled: true
    collector: cpu
    key: host.cpu.load5
    value_type: float
    unit: ""
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      mode: load5

  - id: load_avg_15
    # Disabled — enables: false means this metric is skipped entirely
    enabled: false
    collector: cpu
    key: host.cpu.load15
    value_type: float
    unit: ""
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      mode: load15

  - id: uptime
    enabled: true
    collector: cpu
    key: host.system.uptime
    value_type: float
    unit: "s"
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      mode: uptime

  # ---- Memory ------------------------------------------------------------

  - id: mem_used_percent
    enabled: true
    collector: memory
    key: host.memory.used_percent
    value_type: float
    unit: "%"
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      mode: used_percent

  - id: mem_available_bytes
    enabled: true
    collector: memory
    key: host.memory.available_bytes
    value_type: int
    unit: "B"
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      mode: available_bytes

  - id: swap_used_percent
    enabled: true
    collector: memory
    key: host.memory.swap_used_percent
    value_type: float
    unit: "%"
    delivery: batch
    timeout_seconds: 5
    # fallback to 0 if /proc/meminfo is unreadable (should not happen normally)
    error_policy: fallback
    fallback_value: "0"
    params:
      mode: swap_used_percent

  # ---- Disk --------------------------------------------------------------

  - id: disk_root_used_percent
    enabled: true
    collector: disk
    key: host.disk.root.used_percent
    value_type: float
    unit: "%"
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mount: "/"
      mode: used_percent

  - id: disk_root_free_bytes
    enabled: true
    collector: disk
    key: host.disk.root.free_bytes
    value_type: int
    unit: "B"
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mount: "/"
      mode: free_bytes

  - id: disk_root_used_bytes
    # Disabled by default — enable alongside used_percent if you want the raw bytes too
    enabled: true
    collector: disk
    key: host.disk.root.used_bytes
    value_type: int
    unit: "B"
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mount: "/"
      mode: used_bytes

  - id: disk_data_used_percent
    # Disabled — enable if you have a separate data partition
    enabled: false
    collector: disk
    key: host.disk.data.used_percent
    value_type: float
    unit: "%"
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mount: "/data"
      mode: used_percent

  # ---- Inodes ------------------------------------------------------------

  - id: disk_root_inodes_used_percent
    enabled: true
    collector: disk
    key: host.disk.root.inodes_used_percent
    value_type: float
    unit: "%"
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mount: "/"
      mode: inodes_used_percent

  - id: disk_root_inodes_free
    enabled: true
    collector: disk
    key: host.disk.root.inodes_free
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mount: "/"
      mode: inodes_free

  - id: disk_root_inodes_used
    enabled: false
    collector: disk
    key: host.disk.root.inodes_used
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mount: "/"
      mode: inodes_used

  - id: disk_root_inodes_total
    enabled: false
    collector: disk
    key: host.disk.root.inodes_total
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mount: "/"
      mode: inodes_total

  # ---- Services ----------------------------------------------------------

  - id: svc_sshd
    enabled: true
    collector: service
    key: host.service.sshd
    value_type: int
    unit: ""
    delivery: immediate     # service checks are sent immediately when collected
    timeout_seconds: 8
    error_policy: mark_failed
    params:
      check_mode: systemd
      service_name: sshd

  - id: svc_nginx
    # Disable if nginx is not installed on this host
    enabled: true
    collector: service
    key: host.service.nginx
    value_type: int
    unit: ""
    delivery: immediate
    timeout_seconds: 8
    error_policy: fallback
    fallback_value: "0"       # treat collector error the same as service down
    params:
      check_mode: systemd
      service_name: nginx

  - id: svc_cron_process
    enabled: true
    collector: service
    key: host.service.cron.process
    value_type: int
    unit: ""
    delivery: immediate
    timeout_seconds: 8
    error_policy: skip
    params:
      check_mode: process
      process_pattern: "cron"   # matches 'cron', 'crond', etc.

  # ---- Network -----------------------------------------------------------

  - id: net_rx_bytes_per_sec
    enabled: false
    collector: network
    key: host.net.rx_bytes_per_sec
    value_type: float
    unit: "B/s"
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      interface: total
      mode: rx_bytes_per_sec

  - id: net_tx_bytes_per_sec
    enabled: false
    collector: network
    key: host.net.tx_bytes_per_sec
    value_type: float
    unit: "B/s"
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      interface: total
      mode: tx_bytes_per_sec

  - id: net_rx_errors
    enabled: true
    collector: network
    key: host.net.rx_errors
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      interface: total
      mode: rx_errors

  - id: net_tx_errors
    enabled: true
    collector: network
    key: host.net.tx_errors
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      interface: total
      mode: tx_errors

  - id: net_rx_dropped
    enabled: true
    collector: network
    key: host.net.rx_dropped
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      interface: total
      mode: rx_dropped

  - id: net_tx_dropped
    enabled: true
    collector: network
    key: host.net.tx_dropped
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      interface: total
      mode: tx_dropped

  - id: net_tcp_inuse
    enabled: true
    collector: network
    key: host.net.tcp_inuse
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mode: tcp_inuse

  - id: net_tcp_timewait
    enabled: true
    collector: network
    key: host.net.tcp_timewait
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mode: tcp_timewait

  - id: net_tcp_orphans
    enabled: false
    collector: network
    key: host.net.tcp_orphans
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mode: tcp_orphans

  - id: net_udp_inuse
    enabled: false
    collector: network
    key: host.net.udp_inuse
    value_type: int
    unit: ""
    delivery: batch
    timeout_seconds: 10
    error_policy: skip
    params:
      mode: udp_inuse

  # Per-interface examples — disabled by default; set interface to match your NIC.

  - id: net_eth0_rx_bytes_per_sec
    enabled: false
    collector: network
    key: host.net.eth0.rx_bytes_per_sec
    value_type: float
    unit: "B/s"
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      interface: eth0
      mode: rx_bytes_per_sec

  - id: net_eth0_tx_bytes_per_sec
    enabled: false
    collector: network
    key: host.net.eth0.tx_bytes_per_sec
    value_type: float
    unit: "B/s"
    delivery: batch
    timeout_seconds: 5
    error_policy: skip
    params:
      interface: eth0
      mode: tx_bytes_per_sec

  # ---- Log ---------------------------------------------------------------

  - id: log_app_error
    enabled: true
    collector: log
    key: app.log.error
    value_type: int
    unit: ""
    delivery: immediate
    timeout_seconds: 30
    error_policy: skip
    params:
      path: "/var/log/myapp/app.log"
      match: "ERROR"
      mode: condition
      default_value: 0
      conditions:
        - value: 1

  - id: log_app_severity
    enabled: true
    collector: log
    key: "app.log.severity"
    value_type: int
    unit: ""
    delivery: immediate
    timeout_seconds: 30
    error_policy: skip
    params:
      path: "/var/log/myapp/app.log"
      match: "WARN|ERROR|FATAL|OutOfMemory"
      mode: condition
      result: max
      default_value: 0
      conditions:
        - when: "FATAL|OutOfMemory"
          value: 3
        - when: "ERROR"
          value: 2
        - when: "WARN"
          value: 1
        - value: 0

  - id: log_api_response_time_max
    enabled: true
    collector: log
    key: "app.log.api.response_time_max_ms"
    value_type: float
    unit: "ms"
    delivery: batch
    timeout_seconds: 30
    error_policy: skip
    params:
      path: "/var/log/myapp/access.log"
      match: "response_time="
      mode: condition
      result: max
      default_value: 0
      conditions:
        - extract: 'response_time=(\d+(?:\.\d+)?)'
          compare: gt
          threshold: 2000
          value: "$1"
        - extract: 'response_time=(\d+(?:\.\d+)?)'
          compare: gt
          threshold: 500
          value: "$1"
        - value: 0

  - id: log_payment_api_calls_total
    enabled: true
    collector: log
    key: "app.log.payment.calls.total"
    value_type: int
    unit: "calls"
    delivery: batch
    timeout_seconds: 60
    error_policy: skip
    params:
      path: "/var/log/myapp/access.log"
      match: "POST /api/v1/payment"
      mode: count

  # ---- Probes ------------------------------------------------------------
  # Each probe below requires a matching Trapper item in Zabbix.
  # Sub-key items (.response_time_ms, .ssl_check) need their own Trapper items.
  # All probes use delivery: immediate (from collector_defaults.probe).

  # --- TCP probes ---

  - id: probe_google_dns
    # Check that Google's public DNS port is reachable (good basic connectivity
    # test that works without HTTP — always disable on hosts with firewall rules
    # blocking outbound UDP/TCP 53)
    enabled: true
    collector: probe
    key: probe.google.dns
    value_type: int
    unit: ""
    timeout_seconds: 5
    error_policy: skip
    params:
      host: 8.8.8.8
      port: 53
      mode: tcp
      on_success: 1
      on_failure: 0
      response_time_ms: true    # also sends probe.google.dns.response_time_ms

  - id: probe_github_https_port
    # Check GitHub HTTPS port is reachable — useful as an outbound HTTPS
    # connectivity indicator
    enabled: true
    collector: probe
    key: probe.github.https.port
    value_type: int
    unit: ""
    timeout_seconds: 5
    error_policy: skip
    params:
      host: github.com
      port: 443
      mode: tcp
      on_success: 1
      on_failure: 0

  # --- HTTP status probes ---

  - id: probe_github_api_up
    # Check the GitHub REST API root returns a 2xx response.
    # If unreachable, default_value 0 is sent.
    enabled: true
    collector: probe
    key: probe.github.api.up
    value_type: int
    unit: ""
    timeout_seconds: 10
    error_policy: skip
    params:
      url: https://api.github.com
      mode: http_status
      default_value: 0
      response_time_ms: true    # also sends probe.github.api.up.response_time_ms
      ssl_check: true           # also sends probe.github.api.up.ssl_check
      conditions:
        - when: "^2"
          value: 1
        - when: "^4"
          value: 2
        - when: "^5"
          value: 3
        - value: 0

  - id: probe_httpbin_status_200
    # Verify httpbin.org returns 200 — a simple public HTTP testing target.
    # Replace with your own service URL for real monitoring.
    enabled: false
    collector: probe
    key: probe.httpbin.status.200
    value_type: int
    unit: ""
    timeout_seconds: 10
    error_policy: skip
    params:
      url: https://httpbin.org/status/200
      mode: http_status
      default_value: 0
      response_time_ms: false
      conditions:
        - when: "^2"
          value: 1
        - value: 0

  # --- HTTP body probes ---

  - id: probe_github_api_body
    # Verify the GitHub API root returns JSON with expected content.
    # The response body contains "current_user_url" which confirms it is the
    # real API and not a proxy or CDN error page.
    enabled: true
    collector: probe
    key: probe.github.api.body
    value_type: int
    unit: ""
    timeout_seconds: 10
    error_policy: skip
    params:
      url: https://api.github.com
      mode: http_body
      method: GET
      headers:
        Accept: "application/vnd.github+json"
        User-Agent: "zabbig-probe/1.0"
      match: '"current_user_url"'
      result: last
      default_value: 0
      response_time_ms: false
      ssl_check: true           # also sends probe.github.api.body.ssl_check
      conditions:
        - when: '"current_user_url"'
          value: 1
        - value: 0

  - id: probe_httpbin_json_body
    # Probe httpbin.org/json — checks that the response body contains expected
    # JSON structure. Replace with your own health-check endpoint.
    # httpbin.org/json returns { "slideshow": { "author": "Yours Truly", ... } }
    enabled: false
    collector: probe
    key: probe.httpbin.json.body
    value_type: int
    unit: ""
    timeout_seconds: 10
    error_policy: skip
    params:
      url: https://httpbin.org/json
      mode: http_body
      match: '"slideshow"'
      result: last
      default_value: 0
      max_response_bytes: 8192
      response_time_ms: true
      conditions:
        - when: '"author"'
          value: 1
        - value: 0
