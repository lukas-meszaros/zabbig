# =============================================================================
# metrics.yaml — Metric definitions for the zabbig monitoring client
#
# -----------------------------------------------------------------------------
# TOP-LEVEL STRUCTURE
# -----------------------------------------------------------------------------
#
#   version            integer   Schema version. Must be 1.
#
#   defaults           map       Global defaults applied to every metric entry
#                                unless overridden at a lower level.
#
#   collector_defaults map       Per-collector overrides of the global defaults.
#                                Keys are collector names (cpu, memory, disk,
#                                service). Values support the same fields as
#                                defaults.
#
#   metrics            list      Ordered list of individual metric definitions.
#                                Each entry is one data point sent to Zabbix.
#
# -----------------------------------------------------------------------------
# DEFAULTS / COLLECTOR_DEFAULTS FIELDS
# -----------------------------------------------------------------------------
# These fields can appear under both `defaults` and `collector_defaults.<name>`.
# A more specific scope always wins:
#   metric field  >  collector_defaults  >  defaults
#
#   enabled          bool      true | false
#                              Whether to run and send this metric.
#                              Default: true
#
#   delivery         string    batch | immediate
#                              batch     — collected within the batch window,
#                                          then sent together in one request.
#                              immediate — sent as soon as the value is ready,
#                                          before the batch window closes.
#                                          Use for time-sensitive checks (e.g.
#                                          service state).
#                              Default: batch
#
#   timeout_seconds  float     > 0
#                              How long to wait for the collector to return a
#                              value before it is considered timed out. The
#                              error_policy then applies.
#                              Default: 10
#
#   error_policy     string    skip | fallback | mark_failed
#                              skip        — Silently discard the metric for
#                                            this run. Nothing is sent to
#                                            Zabbix. The run summary counts it
#                                            as "skipped".
#                              fallback    — Send fallback_value to Zabbix
#                                            instead of the real value. Useful
#                                            when a missing feature (e.g. no
#                                            swap) should report a known-good
#                                            sentinel (e.g. "0").
#                                            Requires fallback_value to be set
#                                            on the metric entry.
#                              mark_failed — Log an error and count the metric
#                                            as failed in the run summary. Does
#                                            not send anything to Zabbix.
#                              Default: skip
#
#   importance       string    low | normal | high | critical
#                              Informational label used in log output and the
#                              run summary. Does not affect send behaviour.
#                              Default: normal
#
#   tags             list      Arbitrary string labels (e.g. [system, cpu]).
#                              Informational only — used for filtering in logs.
#                              Default: []
#
# -----------------------------------------------------------------------------
# METRIC ENTRY FIELDS
# -----------------------------------------------------------------------------
# Each entry under `metrics` supports the fields above (enabled, delivery,
# timeout_seconds, error_policy, importance, tags) plus the following:
#
#   id               string    REQUIRED. Unique identifier for this metric
#                              within this file. Used in logs and state files.
#                              Example: cpu_util
#
#   name             string    Optional. Human-readable display name shown in
#                              log output.
#                              Example: "CPU utilization percent"
#
#   description      string    Optional. Longer free-text description. Supports
#                              YAML block scalars (> or |).
#
#   collector        string    REQUIRED. Which built-in collector to use.
#                              Valid values: cpu | memory | disk | service
#
#   key              string    REQUIRED. Zabbix item key. Must exactly match a
#                              Zabbix Trapper item configured on the target host.
#                              Example: host.cpu.util
#
#   value_type       string    float | int | string
#                              Informational hint only. Does not affect the wire
#                              format — all values are sent as strings.
#
#   unit             string    Informational unit label (e.g. "%", "B", "s").
#                              Not sent to Zabbix; used in logs only.
#
#   fallback_value   string    REQUIRED when error_policy is "fallback".
#                              The value sent to Zabbix when the collector
#                              fails or times out. Must be a string (quote
#                              numeric values). Example: "0"
#
#   params           map       REQUIRED. Collector-specific parameters.
#                              See per-collector sections below.
#
#   params.proc_root string    UNIVERSAL OVERRIDE for proc-based collectors
#                              (cpu, memory, service/process).
#                              Overrides runtime.proc_root from client.yaml
#                              for this specific metric only.
#                              Default: value of runtime.proc_root (which
#                              itself defaults to "/proc").
#                              Example: proc_root: "/host/proc"
#
# -----------------------------------------------------------------------------
# PARAMS — cpu collector
# -----------------------------------------------------------------------------
#   mode   string   REQUIRED
#          percent   — Total CPU utilisation 0-100. Calculated from two
#                      /proc/stat reads 200 ms apart (requires Linux).
#          load1     — 1-minute load average from /proc/loadavg.
#          load5     — 5-minute load average from /proc/loadavg.
#          load15    — 15-minute load average from /proc/loadavg.
#          uptime    — System uptime in seconds from /proc/uptime.
#
#   proc_root  string  Optional. Overrides runtime.proc_root for this metric.
#                      Default: runtime.proc_root (which defaults to "/proc").
#
# -----------------------------------------------------------------------------
# PARAMS — memory collector
# -----------------------------------------------------------------------------
#   mode   string   REQUIRED
#          used_percent       — RAM in use as a percentage.
#                               Calculated as (MemTotal - MemAvailable) /
#                               MemTotal * 100. Source: /proc/meminfo.
#          available_bytes    — MemAvailable field from /proc/meminfo (bytes).
#                               Represents memory available for new allocations
#                               without swapping.
#          swap_used_percent  — Swap in use as a percentage.
#                               Returns 0.0 when no swap is configured.
#                               Source: SwapTotal / SwapFree in /proc/meminfo.
#
#   proc_root  string  Optional. Overrides runtime.proc_root for this metric.
#                      Default: runtime.proc_root (which defaults to "/proc").
#
# -----------------------------------------------------------------------------
# PARAMS — disk collector
# -----------------------------------------------------------------------------
#   mount  string   REQUIRED. Absolute path to the mount point to inspect.
#                   Example: "/"  "/data"  "/var"
#
#   mode   string   REQUIRED
#          used_percent        — Percentage of filesystem blocks in use.
#                                Uses os.statvfs(); works on Linux and macOS.
#          used_bytes          — Bytes currently used (total - available to non-root).
#                                Uses os.statvfs(); works on Linux and macOS.
#          free_bytes          — Bytes available to non-root users (f_bavail).
#                                Uses os.statvfs(); works on Linux and macOS.
#          inodes_used_percent — Inode slots in use as a percentage of the total.
#                                Returns 0.0 on filesystems with dynamic inode
#                                allocation (e.g. btrfs) where f_files == 0.
#                                Uses os.statvfs(); works on Linux and macOS.
#          inodes_used         — Number of inode slots currently in use.
#                                Uses os.statvfs(); works on Linux and macOS.
#          inodes_free         — Number of free inode slots (f_ffree).
#                                Uses os.statvfs(); works on Linux and macOS.
#          inodes_total        — Total inode slots on the filesystem (f_files).
#                                Uses os.statvfs(); works on Linux and macOS.
#
# -----------------------------------------------------------------------------
# PARAMS — service collector
# -----------------------------------------------------------------------------
#   check_mode      string   REQUIRED
#                   systemd  — Runs `systemctl is-active --quiet <service_name>`.
#                              Returns 1 if exit code 0, 0 otherwise.
#                              Requires systemd and a Linux host.
#                   process  — Scans {proc_root}/*/cmdline for a matching process.
#                              Returns 1 if at least one process matches,
#                              0 otherwise. Requires Linux /proc filesystem.
#
#   service_name    string   REQUIRED when check_mode is "systemd".
#                            The systemd unit name (without .service suffix).
#                            Example: sshd  nginx  postgresql
#
#   process_pattern string   REQUIRED when check_mode is "process".
#                            Python regex matched against each process's full
#                            cmdline string. Case-sensitive.
#                            Example: "cron"  matches crond, cron, anacron, etc.
#                            Example: "nginx: master"  for strict nginx check.
#
#   proc_root       string   Optional. Applies only to check_mode: process.
#                            Overrides runtime.proc_root for this metric.
#                            Default: runtime.proc_root (which defaults to "/proc").
#
# -----------------------------------------------------------------------------
# PARAMS — network collector
# -----------------------------------------------------------------------------
# Reads from {proc_root}/net/dev and {proc_root}/net/sockstat (Linux only).
# macOS and other systems without a proc filesystem will fail; error_policy
# applies (default: skip).
#
#   interface  string   REQUIRED for all traffic/error/counter modes.
#                       The NIC name as shown in /proc/net/dev.
#                       Example: eth0  ens3  enp1s0
#                       Use "total" to aggregate all non-loopback interfaces.
#                       NOT required for socket modes (tcp_inuse, tcp_timewait,
#                       tcp_orphans, udp_inuse).
#
#   mode       string   REQUIRED
#
#              Rate modes — read /proc/net/dev twice with a 1 s sleep:
#                rx_bytes_per_sec  — Inbound throughput in bytes/second.
#                tx_bytes_per_sec  — Outbound throughput in bytes/second.
#                Set timeout_seconds >= 3 for rate modes.
#
#              Cumulative counter modes — single /proc/net/dev read:
#                rx_bytes          — Total bytes received since boot.
#                tx_bytes          — Total bytes transmitted since boot.
#                rx_packets        — Total packets received since boot.
#                tx_packets        — Total packets transmitted since boot.
#                rx_errors         — Total receive errors since boot.
#                tx_errors         — Total transmit errors since boot.
#                rx_dropped        — Total receive drops since boot.
#                tx_dropped        — Total transmit drops since boot.
#
#              Socket counters — from /proc/net/sockstat, no interface param:
#                tcp_inuse         — Currently open TCP sockets.
#                tcp_timewait      — Sockets in TIME_WAIT state.
#                tcp_orphans       — Orphaned TCP sockets (no fd attached).
#                udp_inuse         — Currently open UDP sockets.
#
#   proc_root  string  Optional. Overrides runtime.proc_root for this metric.
#                      Default: runtime.proc_root (which defaults to "/proc").
#
# -----------------------------------------------------------------------------
# PARAMS — log collector
# -----------------------------------------------------------------------------
# Monitors application log files for specific messages.
# Memory-efficient: files are read line-by-line after seeking to the stored
# offset — the full file is NEVER loaded into memory.
#
#   path          string   REQUIRED
#                          Path to the log file. The basename (filename part)
#                          may be a Python regex; the directory is always
#                          treated as a literal path. The most recently
#                          modified matching file is used.
#                          Examples:
#                            path: /var/log/myapp/app.log
#                            path: /var/log/myapp/app-\d{8}\.log
#
#   match         string   REQUIRED
#                          Python regex applied to every line. Only matching
#                          lines are forwarded to condition evaluation or
#                          counted. Use anchors (^) or keywords to narrow
#                          the set as tightly as possible.
#
#   mode          string   condition | count    (default: condition)
#
#                          condition — Incremental scan from the last stored
#                            byte offset to EOF. Evaluates `conditions` on
#                            each matching line and returns one value per run.
#                            The byte offset and inode are persisted between
#                            runs (see `state_dir`). Rotation detection:
#                            a new inode or a smaller file size resets the
#                            offset to 0.
#
#                          count — Full-file scan (byte 0 → EOF) every run.
#                            Counts all lines matching `match` and returns a
#                            cumulative integer. The value grows monotonically
#                            as the file grows; use a Zabbix "Delta per second"
#                            preprocessing step for rate-of-change graphs.
#                            No state file is written in this mode.
#                            NOTE: cost scales with file size, not new content.
#                            Avoid on files > ~100 MB with short intervals.
#
#   encoding      string   File character encoding.  Default: utf-8
#
#   result        string   (mode=condition only)
#                          How to collapse values from multiple matching lines
#                          found in one scan window into a single Zabbix value:
#                            last  — value from the LAST  matching line (default)
#                            first — value from the FIRST matching line
#                            max   — numerically highest value across all matches
#                            min   — numerically lowest  value across all matches
#                          Non-numeric values are ignored for max/min; last is
#                          used as fallback when no numeric values exist.
#
#   default_value any      (mode=condition only)
#                          Value sent to Zabbix when no line matched `match`
#                          in this scan window. Keeps the item from going stale.
#                          Default: 0
#
#   conditions    list     (mode=condition only)
#                          Ordered list of sub-conditions evaluated against
#                          each line that already passed `match`. The FIRST
#                          matching entry wins.
#
#                          Each entry supports one of three forms:
#
#                          Form 1 — regex match:
#                            when:  <Python regex>
#                            value: <literal value to return>
#
#                          Form 2 — numeric extract + comparison:
#                            extract:   <Python regex with ONE capture group>
#                            compare:   gt | lt | gte | lte | eq
#                            threshold: <number>
#                            value:     <literal value>  OR  "$1"
#                          `extract` runs re.search on the line. The text
#                          inside the capture group () is cast to float and
#                          compared against `threshold`. Use value: "$1" to
#                          return the captured number itself as the metric
#                          value instead of a fixed constant.
#
#                          Form 3 — catch-all (place last):
#                            value: <literal value>
#                          No `when` or `extract` — matches any line that
#                          passed `match` but no earlier condition.
#
#                          NOTE: `when` and `extract` are mutually exclusive.
#
#   state_dir     string   Directory where offset state files are written.
#                          One file per metric: state/log_<metric_id>.json
#                          Default: "state"  (relative to working directory)
#
# =============================================================================

version: 1

# ---------------------------------------------------------------------------
# Global defaults — applied to every metric unless overridden at a lower level
# ---------------------------------------------------------------------------
defaults:
  enabled: true
  delivery: batch
  timeout_seconds: 10
  error_policy: skip
  importance: normal
  tags: []

# ---------------------------------------------------------------------------
# Collector-level defaults — override global defaults for a specific collector
# ---------------------------------------------------------------------------
collector_defaults:
  cpu:
    timeout_seconds: 5
    delivery: batch
  memory:
    timeout_seconds: 5
    delivery: batch
  disk:
    timeout_seconds: 10
    delivery: batch
  service:
    timeout_seconds: 8
    delivery: immediate     # service state changes are sent immediately
  network:
    timeout_seconds: 10
    delivery: batch
  log:
    timeout_seconds: 60
    delivery: batch

# ---------------------------------------------------------------------------
# Metrics
# ---------------------------------------------------------------------------
metrics:

  # ---- CPU ---------------------------------------------------------------

  - id: cpu_util
    name: CPU utilization percent
    description: Current total CPU utilization as a percentage.
    enabled: true
    collector: cpu
    key: host.cpu.util
    value_type: float
    unit: "%"
    delivery: batch
    importance: normal
    timeout_seconds: 5
    error_policy: skip
    tags: [system, cpu]
    params:
      mode: percent

  - id: load_avg_1
    name: Load average 1-minute
    description: System load average over 1 minute.
    enabled: true
    collector: cpu
    key: host.cpu.load1
    value_type: float
    unit: ""
    delivery: batch
    importance: normal
    timeout_seconds: 5
    error_policy: skip
    tags: [system, cpu]
    params:
      mode: load1

  - id: load_avg_5
    name: Load average 5-minute
    description: System load average over 5 minutes.
    enabled: true
    collector: cpu
    key: host.cpu.load5
    value_type: float
    unit: ""
    delivery: batch
    importance: normal
    timeout_seconds: 5
    error_policy: skip
    tags: [system, cpu]
    params:
      mode: load5

  - id: load_avg_15
    name: Load average 15-minute
    description: System load average over 15 minutes.
    # Disabled — enables: false means this metric is skipped entirely
    enabled: false
    collector: cpu
    key: host.cpu.load15
    value_type: float
    unit: ""
    delivery: batch
    importance: low
    timeout_seconds: 5
    error_policy: skip
    tags: [system, cpu]
    params:
      mode: load15

  - id: uptime
    name: System uptime seconds
    description: How long the system has been running, in seconds.
    enabled: true
    collector: cpu
    key: host.system.uptime
    value_type: float
    unit: "s"
    delivery: batch
    importance: low
    timeout_seconds: 5
    error_policy: skip
    tags: [system]
    params:
      mode: uptime

  # ---- Memory ------------------------------------------------------------

  - id: mem_used_percent
    name: Memory used percent
    description: Percentage of RAM currently in use.
    enabled: true
    collector: memory
    key: host.memory.used_percent
    value_type: float
    unit: "%"
    delivery: batch
    importance: normal
    timeout_seconds: 5
    error_policy: skip
    tags: [system, memory]
    params:
      mode: used_percent

  - id: mem_available_bytes
    name: Memory available bytes
    description: Amount of RAM available for new allocations (MemAvailable).
    enabled: true
    collector: memory
    key: host.memory.available_bytes
    value_type: int
    unit: "B"
    delivery: batch
    importance: normal
    timeout_seconds: 5
    error_policy: skip
    tags: [system, memory]
    params:
      mode: available_bytes

  - id: swap_used_percent
    name: Swap used percent
    description: Percentage of swap space in use. Returns 0 if no swap is configured.
    enabled: true
    collector: memory
    key: host.memory.swap_used_percent
    value_type: float
    unit: "%"
    delivery: batch
    importance: low
    timeout_seconds: 5
    # fallback to 0 if /proc/meminfo is unreadable (should not happen normally)
    error_policy: fallback
    fallback_value: "0"
    tags: [system, memory]
    params:
      mode: swap_used_percent

  # ---- Disk --------------------------------------------------------------

  - id: disk_root_used_percent
    name: Root filesystem used percent
    description: Percentage of / filesystem used.
    enabled: true
    collector: disk
    key: host.disk.root.used_percent
    value_type: float
    unit: "%"
    delivery: batch
    importance: high
    timeout_seconds: 10
    error_policy: skip
    tags: [system, disk]
    params:
      mount: "/"
      mode: used_percent

  - id: disk_root_free_bytes
    name: Root filesystem free bytes
    description: Free bytes on the / filesystem (available to non-root).
    enabled: true
    collector: disk
    key: host.disk.root.free_bytes
    value_type: int
    unit: "B"
    delivery: batch
    importance: high
    timeout_seconds: 10
    error_policy: skip
    tags: [system, disk]
    params:
      mount: "/"
      mode: free_bytes

  - id: disk_root_used_bytes
    name: Root filesystem used bytes
    description: Bytes currently used on the / filesystem.
    # Disabled by default — enable alongside used_percent if you want the raw bytes too
    enabled: true
    collector: disk
    key: host.disk.root.used_bytes
    value_type: int
    unit: "B"
    delivery: batch
    importance: normal
    timeout_seconds: 10
    error_policy: skip
    tags: [system, disk]
    params:
      mount: "/"
      mode: used_bytes

  - id: disk_data_used_percent
    name: /data filesystem used percent
    description: Percentage of /data filesystem used.
    # Disabled — enable if you have a separate data partition
    enabled: false
    collector: disk
    key: host.disk.data.used_percent
    value_type: float
    unit: "%"
    delivery: batch
    importance: normal
    timeout_seconds: 10
    error_policy: skip
    tags: [system, disk]
    params:
      mount: "/data"
      mode: used_percent

  # ---- Inodes ------------------------------------------------------------

  - id: disk_root_inodes_used_percent
    name: Root filesystem inodes used percent
    description: Percentage of inode slots in use on the / filesystem.
    enabled: true
    collector: disk
    key: host.disk.root.inodes_used_percent
    value_type: float
    unit: "%"
    delivery: batch
    importance: high
    timeout_seconds: 10
    error_policy: skip
    tags: [system, disk, inodes]
    params:
      mount: "/"
      mode: inodes_used_percent

  - id: disk_root_inodes_free
    name: Root filesystem inodes free
    description: Number of free inode slots on the / filesystem.
    enabled: true
    collector: disk
    key: host.disk.root.inodes_free
    value_type: int
    unit: ""
    delivery: batch
    importance: normal
    timeout_seconds: 10
    error_policy: skip
    tags: [system, disk, inodes]
    params:
      mount: "/"
      mode: inodes_free

  - id: disk_root_inodes_used
    name: Root filesystem inodes used
    description: Number of inode slots currently in use on the / filesystem.
    enabled: false
    collector: disk
    key: host.disk.root.inodes_used
    value_type: int
    unit: ""
    delivery: batch
    importance: low
    timeout_seconds: 10
    error_policy: skip
    tags: [system, disk, inodes]
    params:
      mount: "/"
      mode: inodes_used

  - id: disk_root_inodes_total
    name: Root filesystem inodes total
    description: Total inode slots on the / filesystem. Useful as a capacity reference.
    enabled: false
    collector: disk
    key: host.disk.root.inodes_total
    value_type: int
    unit: ""
    delivery: batch
    importance: low
    timeout_seconds: 10
    error_policy: skip
    tags: [system, disk, inodes]
    params:
      mount: "/"
      mode: inodes_total

  # ---- Services ----------------------------------------------------------

  - id: svc_sshd
    name: sshd service state
    description: >
      1 = sshd is active (running), 0 = sshd is not active.
      Uses systemd check (systemctl is-active sshd).
    enabled: true
    collector: service
    key: host.service.sshd
    value_type: int
    unit: ""
    delivery: immediate     # service checks are sent immediately when collected
    importance: critical
    timeout_seconds: 8
    error_policy: mark_failed
    tags: [service, ssh]
    params:
      check_mode: systemd
      service_name: sshd

  - id: svc_nginx
    name: nginx service state
    description: 1 = nginx running, 0 = nginx not running.
    # Disable if nginx is not installed on this host
    enabled: true
    collector: service
    key: host.service.nginx
    value_type: int
    unit: ""
    delivery: immediate
    importance: critical
    timeout_seconds: 8
    error_policy: fallback
    fallback_value: "0"       # treat collector error the same as service down
    tags: [service, web]
    params:
      check_mode: systemd
      service_name: nginx

  - id: svc_cron_process
    name: cron process check
    description: >
      Process-pattern fallback for checking if cron is running.
      Uses /proc scan — works without systemd.
    enabled: true
    collector: service
    key: host.service.cron.process
    value_type: int
    unit: ""
    delivery: immediate
    importance: normal
    timeout_seconds: 8
    error_policy: skip
    tags: [service, cron]
    params:
      check_mode: process
      process_pattern: "cron"   # matches 'cron', 'crond', etc.

  # ---- Network -----------------------------------------------------------

  - id: net_rx_bytes_per_sec
    name: Network receive bytes/sec
    description: >
      Inbound throughput in bytes per second across all non-loopback
      interfaces. Computed from two /proc/net/dev reads 1 second apart.
    enabled: false
    collector: network
    key: host.net.rx_bytes_per_sec
    value_type: float
    unit: "B/s"
    delivery: batch
    importance: normal
    timeout_seconds: 5
    error_policy: skip
    tags: [system, network]
    params:
      interface: total
      mode: rx_bytes_per_sec

  - id: net_tx_bytes_per_sec
    name: Network transmit bytes/sec
    description: >
      Outbound throughput in bytes per second across all non-loopback
      interfaces. Computed from two /proc/net/dev reads 1 second apart.
    enabled: false
    collector: network
    key: host.net.tx_bytes_per_sec
    value_type: float
    unit: "B/s"
    delivery: batch
    importance: normal
    timeout_seconds: 5
    error_policy: skip
    tags: [system, network]
    params:
      interface: total
      mode: tx_bytes_per_sec

  - id: net_rx_errors
    name: Network receive errors
    description: >
      Cumulative receive hardware/driver errors since boot across all
      non-loopback interfaces. A rising value indicates NIC or cable
      problems.
    enabled: true
    collector: network
    key: host.net.rx_errors
    value_type: int
    unit: ""
    delivery: batch
    importance: high
    timeout_seconds: 10
    error_policy: skip
    tags: [system, network]
    params:
      interface: total
      mode: rx_errors

  - id: net_tx_errors
    name: Network transmit errors
    description: >
      Cumulative transmit errors since boot across all non-loopback
      interfaces.
    enabled: true
    collector: network
    key: host.net.tx_errors
    value_type: int
    unit: ""
    delivery: batch
    importance: high
    timeout_seconds: 10
    error_policy: skip
    tags: [system, network]
    params:
      interface: total
      mode: tx_errors

  - id: net_rx_dropped
    name: Network receive drops
    description: >
      Cumulative receive packet drops since boot (kernel buffer overruns)
      across all non-loopback interfaces.
    enabled: true
    collector: network
    key: host.net.rx_dropped
    value_type: int
    unit: ""
    delivery: batch
    importance: high
    timeout_seconds: 10
    error_policy: skip
    tags: [system, network]
    params:
      interface: total
      mode: rx_dropped

  - id: net_tx_dropped
    name: Network transmit drops
    description: >
      Cumulative transmit packet drops since boot across all non-loopback
      interfaces.
    enabled: true
    collector: network
    key: host.net.tx_dropped
    value_type: int
    unit: ""
    delivery: batch
    importance: high
    timeout_seconds: 10
    error_policy: skip
    tags: [system, network]
    params:
      interface: total
      mode: tx_dropped

  - id: net_tcp_inuse
    name: TCP sockets in use
    description: Number of currently open TCP sockets.
    enabled: true
    collector: network
    key: host.net.tcp_inuse
    value_type: int
    unit: ""
    delivery: batch
    importance: normal
    timeout_seconds: 10
    error_policy: skip
    tags: [system, network]
    params:
      mode: tcp_inuse

  - id: net_tcp_timewait
    name: TCP sockets TIME_WAIT
    description: >
      Number of TCP sockets in TIME_WAIT state. A persistently high value
      can indicate connection churn or port exhaustion.
    enabled: true
    collector: network
    key: host.net.tcp_timewait
    value_type: int
    unit: ""
    delivery: batch
    importance: normal
    timeout_seconds: 10
    error_policy: skip
    tags: [system, network]
    params:
      mode: tcp_timewait

  - id: net_tcp_orphans
    name: TCP orphaned sockets
    description: >
      Number of orphaned TCP sockets (not attached to any file descriptor).
      A high and growing count can indicate a socket leak.
    enabled: false
    collector: network
    key: host.net.tcp_orphans
    value_type: int
    unit: ""
    delivery: batch
    importance: low
    timeout_seconds: 10
    error_policy: skip
    tags: [system, network]
    params:
      mode: tcp_orphans

  - id: net_udp_inuse
    name: UDP sockets in use
    description: Number of currently open UDP sockets.
    enabled: false
    collector: network
    key: host.net.udp_inuse
    value_type: int
    unit: ""
    delivery: batch
    importance: low
    timeout_seconds: 10
    error_policy: skip
    tags: [system, network]
    params:
      mode: udp_inuse

  # Per-interface examples — disabled by default; set interface to match your NIC.

  - id: net_eth0_rx_bytes_per_sec
    name: eth0 receive bytes/sec
    description: >
      Per-interface receive throughput for eth0. Enable and adjust
      params.interface to match the NIC name on your host (e.g. ens3, enp1s0).
    enabled: false
    collector: network
    key: host.net.eth0.rx_bytes_per_sec
    value_type: float
    unit: "B/s"
    delivery: batch
    importance: normal
    timeout_seconds: 5
    error_policy: skip
    tags: [system, network]
    params:
      interface: eth0
      mode: rx_bytes_per_sec

  - id: net_eth0_tx_bytes_per_sec
    name: eth0 transmit bytes/sec
    description: >
      Per-interface transmit throughput for eth0.
    enabled: false
    collector: network
    key: host.net.eth0.tx_bytes_per_sec
    value_type: float
    unit: "B/s"
    delivery: batch
    importance: normal
    timeout_seconds: 5
    error_policy: skip
    tags: [system, network]
    params:
      interface: eth0
      mode: tx_bytes_per_sec

  # ---- Log ---------------------------------------------------------------

  - id: log_app_severity
    name: Application log severity
    description: >
      Worst log severity seen in the application log during the last scan
      window. 0=OK (no match), 1=WARN, 2=ERROR, 3=FATAL/OOM.
      Incremental scan — only new lines since the last run are read.
    enabled: false
    collector: log
    key: "app.log.severity"
    value_type: int
    unit: ""
    delivery: immediate
    importance: high
    timeout_seconds: 30
    error_policy: skip
    tags: [app, log]
    params:
      path: "/var/log/myapp/app.log"
      match: "WARN|ERROR|FATAL|OutOfMemory"
      mode: condition
      result: max
      default_value: 0
      conditions:
        - when: "FATAL|OutOfMemory"
          value: 3
        - when: "ERROR"
          value: 2
        - when: "WARN"
          value: 1
        - value: 0             # matched `match` but no sub-condition

  - id: log_api_response_time_max
    name: API max response time (log)
    description: >
      Slowest API response time (ms) seen in the log during the last scan
      window, extracted from lines like:
        [INFO] POST /api/v1/payment response_time=1234ms status=200
      Returns 0 when no response_time lines were found in this window.
    enabled: false
    collector: log
    key: "app.log.api.response_time_max_ms"
    value_type: float
    unit: "ms"
    delivery: batch
    importance: normal
    timeout_seconds: 30
    error_policy: skip
    tags: [app, log, api]
    params:
      path: "/var/log/myapp/access.log"
      match: "response_time="
      mode: condition
      result: max
      default_value: 0
      conditions:
        # Slow: > 2000 ms — return the actual measured value
        - extract: "response_time=(\\d+(?:\\.\\d+)?)"
          compare: gt
          threshold: 2000
          value: "$1"
        # Moderate: > 500 ms
        - extract: "response_time=(\\d+(?:\\.\\d+)?)"
          compare: gt
          threshold: 500
          value: "$1"
        # Fast path: return 0 for anything under 500 ms
        - value: 0

  - id: log_payment_api_calls_total
    name: Payment API calls total (log)
    description: >
      Cumulative count of POST /api/v1/payment calls since the log file was
      created. Grows monotonically; use Zabbix Change/Delta preprocessing
      to derive the per-interval call rate.
      Uses count mode — full-file scan every run.
    enabled: false
    collector: log
    key: "app.log.payment.calls.total"
    value_type: int
    unit: "calls"
    delivery: batch
    importance: low
    timeout_seconds: 60
    error_policy: skip
    tags: [app, log, api]
    params:
      path: "/var/log/myapp/access.log"
      match: "POST /api/v1/payment"
      mode: count
