# databases.yaml — Database connection registry for the zabbig client.
#
# Passwords encrypted with: python3 scripts/encrypt_password.py "password"
# Key stored in: ZABBIG_DB_KEY environment variable or secret.key file.
#
# See databases.yaml.example for a fully-commented reference.

version: 1

databases:

  - name: test_postgres
    type: postgres
    host: "zabbig_postgres_test"   # container name; reachable from other containers on the same Docker network
    port: 5432
    dbname: "testdb"
    username: "monitor"
    password: "monitor_pw"         # plain text — encrypt with scripts/encrypt_password.py when ready
